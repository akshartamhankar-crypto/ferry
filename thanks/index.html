<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thanks — Ferry</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Hanken+Grotesk:wght@400;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>

<body><div class="card">
  <div class="mark">⛴</div>
  <h1>Passage booked.</h1>

  <p style="margin-top:22px"><a href="/">← Back to Ferry</a></p>
